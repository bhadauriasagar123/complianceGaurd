# Render Blueprint — free tier (https://render.com/pricing)
# Database: use Neon PostgreSQL (free) — see docs/DEPLOY_FREE.md
services:
  - type: web
    name: complianceguard-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh scripts/render_start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: SCAN_MOCK_MODE
        value: true
      - key: PROMETHEUS_ENABLED
        value: false
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
