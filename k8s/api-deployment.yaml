apiVersion: apps/v1
kind: Deployment
metadata:
  name: complianceguard-api
  namespace: complianceguard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: complianceguard-api
  template:
    metadata:
      labels:
        app: complianceguard-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: complianceguard/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: complianceguard-secrets
            - configMapRef:
                name: complianceguard-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: complianceguard-api
  namespace: complianceguard
spec:
  selector:
    app: complianceguard-api
  ports:
    - port: 8000
      targetPort: 8000
