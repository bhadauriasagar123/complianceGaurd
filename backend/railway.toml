# Railway service config — set Root Directory to /backend in the Railway dashboard
# Docs: docs/DEPLOY_RAILWAY.md

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh scripts/railway_start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
