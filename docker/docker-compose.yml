services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: complianceguard
      POSTGRES_PASSWORD: complianceguard
      POSTGRES_DB: complianceguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complianceguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass redis_secure_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://complianceguard:complianceguard@postgres:5432/complianceguard
      REDIS_URL: redis://:redis_secure_password@redis:6379/0
      CELERY_BROKER_URL: redis://:redis_secure_password@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:redis_secure_password@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
      - frontend

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://complianceguard:complianceguard@postgres:5432/complianceguard
      CELERY_BROKER_URL: redis://:redis_secure_password@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:redis_secure_password@redis:6379/2
    depends_on:
      - api
      - redis
    networks:
      - backend
      - scan-sandbox

  scanner-nmap:
    build:
      context: ../docker
      dockerfile: Dockerfile.scanner-nmap
    networks:
      - scan-sandbox
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true
    networks:
      - scan-sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - frontend

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - api
      - frontend
    networks:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  scan-sandbox:
    driver: bridge
    internal: true
